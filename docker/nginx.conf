# ── Production: Agent2077.local → port 5000 ──────────────────────────
server {
    listen 80;
    server_name Agent2077.local agent2077.local localhost;

    # Proxy to Agent2077 Node.js server
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # SSE support
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}

# ── App Store apps: per-app nginx server blocks ────────────────────────
#
# NOTE: This template file is NOT used directly by nginx.
# The install.sh script generates /etc/nginx/sites-available/agent2077
# dynamically, baking in the absolute path to the nginx-apps/ directory
# inside the Agent2077 install folder, e.g.:
#
#   include /home/mark/agent2077/nginx-apps/agent2077-app-*.conf;
#
# Agent2077 writes conf files there as a normal user (no sudo needed).
# nginx reads them with its default www-data permissions.
# If you need to update the nginx config manually, run install.sh again
# or copy the relevant include line from the generated sites file.

# ── Dev Server: devagent.local → port 5050 ────────────────────────────
server {
    listen 80;
    server_name devagent.local devagent;

    # Proxy to Agent2077 dev server
    location / {
        proxy_pass http://127.0.0.1:5050;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # SSE support
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
