use_default_settings: true

general:
  instance_name: "Agent2077 Search"
  debug: false

server:
  secret_key: "agent2077-searxng-secret-change-this"
  bind_address: "0.0.0.0"
  port: 8080
  limiter: false

search:
  safe_search: 0
  default_lang: "en"
  formats:
    - html
    - json

ui:
  static_use_hash: true
  default_theme: simple
  
engines:
  - name: google
    engine: google
    shortcut: g
  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
  - name: wikipedia
    engine: wikipedia
    shortcut: wp
  - name: github
    engine: github
    shortcut: gh
  - name: stackoverflow
    engine: stackoverflow
    shortcut: so
  - name: arxiv
    engine: arxiv
    shortcut: ax
